<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rezept SPA</title>
  <link rel="stylesheet" href="static/basic-style.css">
  <link rel="stylesheet" href="static/style.css">
</head>
<body>

  <header>
    <button id="btn-refresh" type="button">Zufall</button>
    <form id="search-form">
      <input type="text" id="search-input" placeholder="Rezept suchen..." required>
      <button type="submit">Suchen</button>
    </form>
  </header>

  <main>
    <transition-container data-params='{"leave":{"name":"fade"}}' data-prevent-default>
    <div id="background" class="initial">
      <p style="padding:20px;">
        Ein zufälliges Rezept von Kochgenossen.at. Eine empfehlenswerte Site für eine hohe Trefferquote ohne aufdringliche Werbung!
      </p>
    </div>
    </transition-container>
  </main>

  <script type="module" src="src/app.js"></script>
</body>
</html>
